<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskBoard — Team Delivery Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --paper:#F5F6F2;
  --surface:#FFFFFF;
  --ink:#1B1F1C;
  --ink-dim:#63685F;
  --ink-faint:#9AA096;
  --line:#DDE2D8;
  --line-strong:#C7CDC1;
  --accent:#1F5D57;
  --accent-soft:#E3EEEB;
  --accent-ink:#0F332F;
  --info:#3B5FA8;
  --info-soft:#E6EBF6;
  --warn:#B9791F;
  --warn-soft:#F7EBD8;
  --danger:#B4443B;
  --danger-soft:#F6E4E2;
  --success:#3E8A5D;
  --success-soft:#E2EFE6;
  --purple:#6B5CA5;
  --purple-soft:#EAE7F3;
  --radius:6px;
  --mono:'JetBrains Mono', ui-monospace, monospace;
  --display:'Space Grotesk', sans-serif;
  --body:'Inter', sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.5;}
h1,h2,h3{font-family:var(--display);margin:0;letter-spacing:-0.01em;}
button{font-family:var(--body);cursor:pointer;}
input,select,textarea{font-family:var(--body);}
::selection{background:var(--accent-soft);}

/* ---------- Layout shell ---------- */
.app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--line);background:var(--surface);gap:16px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:28px;height:28px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--mono);font-weight:700;font-size:13px;flex-shrink:0;}
.brand-text h1{font-size:18px;color:var(--ink);}
.brand-text p{margin:0;font-size:11.5px;color:var(--ink-dim);font-family:var(--mono);letter-spacing:.02em;}

.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);padding:8px 13px;border-radius:var(--radius);font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:border-color .15s, background .15s;}
.btn:hover{border-color:var(--ink-dim);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-ink);border-color:var(--accent-ink);}
.btn-danger{color:var(--danger);}
.btn-ghost{border-color:transparent;background:transparent;color:var(--ink-dim);}
.btn-ghost:hover{background:var(--paper);color:var(--ink);}
.btn-sm{padding:5px 9px;font-size:12px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
input[type=file]{display:none;}

.tabs{display:flex;border-bottom:1px solid var(--line);background:var(--surface);padding:0 24px;gap:4px;}
.tab{padding:11px 14px;font-size:13px;font-weight:500;color:var(--ink-dim);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;}
.tab.active{color:var(--accent-ink);border-bottom-color:var(--accent);}

.filterbar{display:flex;gap:8px;align-items:center;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--line);flex-wrap:wrap;}
.filterbar input[type=text],.filterbar select{border:1px solid var(--line-strong);border-radius:var(--radius);padding:7px 10px;font-size:13px;background:var(--paper);color:var(--ink);}
.filterbar input[type=text]{min-width:200px;flex:1;}
.filterbar .spacer{flex:1;}
.count-pill{font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);background:var(--paper);border:1px solid var(--line);padding:5px 9px;border-radius:20px;}

.main{flex:1;padding:20px 24px 60px;max-width:1400px;width:100%;margin:0 auto;}
.hidden{display:none !important;}

/* ---------- Chips ---------- */
.chip{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2.5px 7px;border-radius:4px;border:1px solid transparent;white-space:nowrap;}
.type-Epic{background:var(--accent-soft);color:var(--accent-ink);border-color:#c6ddd8;}
.type-Feature{background:var(--info-soft);color:var(--info);border-color:#cdd8ee;}
.type-Task{background:var(--paper);color:var(--ink-dim);border-color:var(--line-strong);}
.type-Subtask{background:var(--purple-soft);color:var(--purple);border-color:#d9d3ea;}
.type-Issue{background:var(--danger-soft);color:var(--danger);border-color:#eecac6;}

.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.status-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.st-Backlog{background:var(--paper);color:var(--ink-dim);border:1px solid var(--line-strong);}
.st-InProgress{background:var(--info-soft);color:var(--info);}
.st-Blocked{background:var(--danger-soft);color:var(--danger);}
.st-InReview{background:var(--warn-soft);color:var(--warn);}
.st-Done{background:var(--success-soft);color:var(--success);}

.pri-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.pri-Low{background:var(--ink-faint);}
.pri-Medium{background:var(--info);}
.pri-High{background:var(--warn);}
.pri-Critical{background:var(--danger);}

.overdue{color:var(--danger) !important;font-weight:600;}

/* ---------- Tree view ---------- */
.tree-wrap{background:var(--surface);border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.tree-header{display:grid;grid-template-columns:1fr 100px 130px 90px 100px 110px 90px;gap:10px;padding:9px 14px;background:var(--paper);border-bottom:1px solid var(--line);font-size:11px;font-weight:600;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.03em;}
.tree-row{display:grid;grid-template-columns:1fr 100px 130px 90px 100px 110px 90px;gap:10px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);font-size:13px;transition:background .1s;}
.tree-row:last-child{border-bottom:none;}
.tree-row:hover{background:var(--paper);}
.tree-row:hover .row-actions{opacity:1;}
.tree-title-cell{display:flex;align-items:center;gap:6px;min-width:0;}
.tree-indent{flex-shrink:0;display:flex;align-items:center;}
.tree-guide{width:16px;height:22px;position:relative;flex-shrink:0;}
.expand-btn{width:18px;height:18px;flex-shrink:0;border:none;background:none;color:var(--ink-dim);display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:11px;}
.expand-btn:hover{background:var(--line);}
.expand-btn.leaf{visibility:hidden;}
.item-title{font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-title button{background:none;border:none;padding:0;font:inherit;color:inherit;text-align:left;}
.item-title button:hover{text-decoration:underline;}
.row-actions{opacity:0;display:flex;gap:2px;transition:opacity .1s;}
.icon-btn{width:22px;height:22px;border:none;background:none;color:var(--ink-faint);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.icon-btn:hover{background:var(--line);color:var(--ink);}
.hours-cell{font-family:var(--mono);font-size:12px;color:var(--ink-dim);}
.hours-cell b{color:var(--ink);font-weight:600;}
.assignee-cell{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-dim);}
.avatar{width:20px;height:20px;border-radius:50%;background:var(--accent-soft);color:var(--accent-ink);font-family:var(--mono);font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.date-cell{font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);}
.parent-cell{position:relative;display:flex;align-items:center;min-width:0;}
.parent-display{width:100%;text-align:left;background:none;border:none;padding:3px 4px;border-radius:4px;font-size:12px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.parent-display:hover{background:var(--line);color:var(--ink);}
.parent-select{width:100%;font-size:11.5px;padding:4px 6px;border:1px solid var(--line-strong);border-radius:4px;background:var(--surface);color:var(--ink);max-width:100%;}
.parent-select:focus{outline:2px solid var(--accent);outline-offset:1px;}
.parent-none{font-size:11px;color:var(--ink-faint);font-family:var(--mono);}

/* ---------- Table view ---------- */
.table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:8px;overflow-x:auto;}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-dim);font-weight:600;padding:10px 14px;background:var(--paper);border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none;}
.data-table th:hover{color:var(--ink);}
.data-table th.sorted::after{content:' ▾';font-size:9px;}
.data-table td{padding:9px 14px;border-bottom:1px solid var(--line);vertical-align:middle;white-space:nowrap;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover{background:var(--paper);}
.path-cell{font-family:var(--mono);font-size:11px;color:var(--ink-faint);max-width:220px;overflow:hidden;text-overflow:ellipsis;}
.desc-truncate{max-width:260px;overflow:hidden;text-overflow:ellipsis;color:var(--ink-dim);font-size:12.5px;}
.actions-cell{display:flex;gap:2px;}

/* ---------- Dashboard ---------- */
.cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.metric-card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:16px 18px;}
.metric-card .label{font-size:11.5px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.03em;font-weight:600;margin-bottom:6px;}
.metric-card .value{font-family:var(--display);font-size:26px;font-weight:600;color:var(--ink);}
.metric-card .sub{font-size:11.5px;color:var(--ink-faint);margin-top:2px;font-family:var(--mono);}
.charts-row{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;}
.chart-card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:18px;}
.chart-card h3{font-size:13px;margin-bottom:14px;color:var(--ink);}
.chart-card canvas{max-height:280px;}
.assignee-table{width:100%;font-size:12.5px;border-collapse:collapse;margin-top:8px;}
.assignee-table th{text-align:left;font-size:10.5px;color:var(--ink-dim);text-transform:uppercase;padding:6px 0;border-bottom:1px solid var(--line);}
.assignee-table td{padding:7px 0;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px;}
.assignee-table tr:last-child td{border-bottom:none;}

/* ---------- Empty state ---------- */
.empty-state{padding:60px 20px;text-align:center;color:var(--ink-dim);}
.empty-state .glyph{font-family:var(--mono);font-size:28px;color:var(--ink-faint);margin-bottom:10px;}
.empty-state h3{color:var(--ink);margin-bottom:6px;font-size:15px;}
.empty-state p{font-size:13px;margin-bottom:16px;}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(20,24,20,0.42);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow-y:auto;}
.modal{background:var(--surface);border-radius:10px;width:100%;max-width:560px;box-shadow:0 12px 40px rgba(0,0,0,.18);animation:modalIn .15s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);}
.modal-header h2{font-size:16px;}
.modal-close{border:none;background:none;color:var(--ink-dim);font-size:18px;width:28px;height:28px;border-radius:6px;}
.modal-close:hover{background:var(--paper);}
.modal-body{padding:18px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px;max-height:70vh;overflow-y:auto;}
.field{display:flex;flex-direction:column;gap:4px;}
.field.full{grid-column:1/-1;}
.field label{font-size:11.5px;font-weight:600;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.02em;}
.field input,.field select,.field textarea{border:1px solid var(--line-strong);border-radius:var(--radius);padding:8px 10px;font-size:13.5px;background:var(--paper);color:var(--ink);width:100%;}
.field textarea{resize:vertical;min-height:60px;font-family:var(--body);}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
.modal-footer{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-top:1px solid var(--line);gap:10px;flex-wrap:wrap;}
.hint{font-size:12px;color:var(--ink-faint);}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-dim);}
.checkbox-row input{width:auto;}

/* ---------- Toasts ---------- */
#toastContainer{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200;}
.toast{background:var(--ink);color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;box-shadow:0 6px 18px rgba(0,0,0,.2);animation:toastIn .2s ease;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

@media (max-width:900px){
  .tree-header,.tree-row{grid-template-columns:1fr 80px 80px;}
  .tree-header span:nth-child(4),.tree-header span:nth-child(5),.tree-header span:nth-child(6),
  .tree-row .hide-sm{display:none;}
  .cards-row{grid-template-columns:1fr 1fr;}
  .charts-row{grid-template-columns:1fr;}
  .modal-body{grid-template-columns:1fr;}
}
@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important;}
}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">T</div>
      <div class="brand-text">
        <h1>TaskBoard</h1>
        <p>TEAM DELIVERY TRACKER</p>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-sm" id="btnTemplate">Download template</button>
      <button class="btn" id="btnImport">Import CSV</button>
      <input type="file" id="fileInput" accept=".csv">
      <button class="btn" id="btnExport">Export CSV</button>
      <button class="btn btn-primary" id="btnNew">+ New item</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-view="tree">Hierarchy</button>
    <button class="tab" data-view="table">Table</button>
    <button class="tab" data-view="dashboard">Team dashboard</button>
  </div>

  <div class="filterbar">
    <input type="text" id="searchInput" placeholder="Search titles…">
    <select id="filterType"><option value="">All types</option></select>
    <select id="filterStatus"><option value="">All statuses</option></select>
    <select id="filterPriority"><option value="">All priorities</option></select>
    <select id="filterAssignee"><option value="">All assignees</option></select>
    <div class="spacer"></div>
    <span class="count-pill" id="countPill">0 items</span>
    <button class="btn btn-ghost btn-sm" id="btnClearFilters">Clear</button>
  </div>

  <div class="main">
    <div id="viewTree"></div>
    <div id="viewTable" class="hidden"></div>
    <div id="viewDashboard" class="hidden"></div>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toastContainer"></div>

<script>
/* =========================================================
   DATA LAYER
========================================================= */
const TYPES = ['Epic','Feature','Task','Subtask','Issue'];
const PREFIX = {Epic:'EPIC',Feature:'FEAT',Task:'TASK',Subtask:'SUB',Issue:'ISS'};
const ALLOWED_PARENTS = {Epic:[],Feature:['Epic'],Task:['Epic','Feature'],Subtask:['Task'],Issue:['Epic','Feature','Task','Subtask']};
const STATUSES = ['Backlog','In Progress','Blocked','In Review','Done'];
const PRIORITIES = ['Low','Medium','High','Critical'];
const STORE_KEY = 'taskboard-tracker-data';

let state = {
  items: [],
  counters: {Epic:0,Feature:0,Task:0,Subtask:0,Issue:0},
  view: 'tree',
  expanded: new Set(),
  filters: {search:'', type:'', status:'', priority:'', assignee:''},
  sort: {key:'title', dir:1}
};

function todayStr(){ return new Date().toISOString().slice(0,10); }

function seedData(){
  const mk = (type, title, parentId, extra={}) => {
    state.counters[type]++;
    const id = PREFIX[type] + '-' + state.counters[type];
    const item = Object.assign({
      id, type, parentId: parentId || '', title,
      description:'', assignee:'', status:'Backlog', priority:'Medium',
      estHours:0, actHours:0, startDate:'', dueDate:'', tags:'',
      createdAt: todayStr()
    }, extra);
    state.items.push(item);
    return id;
  };
  const epic = mk('Epic','Website Relaunch','', {description:'Rebuild the marketing site and checkout.', assignee:'Priya Nair', status:'In Progress', priority:'High', estHours:400, actHours:180, startDate:'2026-06-01', dueDate:'2026-08-15'});
  const feat1 = mk('Feature','Checkout Flow', epic, {assignee:'Marco Diaz', status:'In Progress', priority:'Critical', estHours:120, actHours:70, startDate:'2026-06-05', dueDate:'2026-07-20'});
  const feat2 = mk('Feature','Design System', epic, {assignee:'Aisha Khan', status:'Backlog', priority:'Medium', estHours:80, actHours:10, startDate:'2026-06-20', dueDate:'2026-08-01'});
  const t1 = mk('Task','Build payment form', feat1, {assignee:'Marco Diaz', status:'In Progress', priority:'High', estHours:24, actHours:18, startDate:'2026-06-10', dueDate:'2026-06-25'});
  mk('Subtask','Add card validation', t1, {assignee:'Marco Diaz', status:'Done', priority:'Medium', estHours:6, actHours:7, startDate:'2026-06-10', dueDate:'2026-06-14'});
  mk('Subtask','Wire up Stripe webhook', t1, {assignee:'Dev Patel', status:'In Progress', priority:'High', estHours:10, actHours:6, startDate:'2026-06-14', dueDate:'2026-06-22'});
  const t2 = mk('Task','Cart persistence', feat1, {assignee:'Dev Patel', status:'Blocked', priority:'High', estHours:16, actHours:4, startDate:'2026-06-15', dueDate:'2026-07-01'});
  mk('Issue','Cart clears on refresh in Safari', t2, {assignee:'Dev Patel', status:'Blocked', priority:'Critical', estHours:4, actHours:2, startDate:'2026-06-20', dueDate:'2026-06-24'});
  mk('Task','Componentize buttons & inputs', feat2, {assignee:'Aisha Khan', status:'Backlog', priority:'Medium', estHours:20, actHours:0, startDate:'2026-07-01', dueDate:'2026-07-18'});
  const epic2 = mk('Epic','Q3 Reporting Suite','', {description:'Internal analytics dashboards for leadership.', assignee:'Priya Nair', status:'Backlog', priority:'Medium', estHours:200, actHours:0, startDate:'2026-07-01', dueDate:'2026-09-30'});
  mk('Feature','Export pipelines', epic2, {assignee:'Aisha Khan', status:'Backlog', priority:'Low', estHours:40, actHours:0, startDate:'2026-07-10', dueDate:'2026-08-10'});
  state.expanded = new Set([epic, feat1, t1, t2]);
}

async function loadData(){
  try{
    const res = await window.storage.get(STORE_KEY, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state.items = parsed.items || [];
      state.counters = parsed.counters || state.counters;
      if(state.items.length === 0) seedData();
    } else {
      seedData();
      await persist();
    }
  } catch(e){
    seedData();
    try{ await persist(); }catch(e2){}
  }
}

async function persist(){
  try{
    await window.storage.set(STORE_KEY, JSON.stringify({items: state.items, counters: state.counters}), false);
  }catch(e){
    console.error('Storage error', e);
    toast('Could not save — your changes may not persist.');
  }
}

function nextId(type){
  state.counters[type] = (state.counters[type]||0) + 1;
  return PREFIX[type] + '-' + state.counters[type];
}

function recalcCountersFromItems(){
  TYPES.forEach(t=>{
    let max = 0;
    state.items.filter(i=>i.type===t).forEach(i=>{
      const m = /-(\d+)$/.exec(i.id);
      if(m) max = Math.max(max, parseInt(m[1],10));
    });
    state.counters[t] = Math.max(state.counters[t]||0, max);
  });
}

function childrenOf(id){ return state.items.filter(i=>i.parentId===id); }
function descendantsOf(id){
  const out = [];
  const stack = [id];
  while(stack.length){
    const cur = stack.pop();
    const kids = childrenOf(cur);
    kids.forEach(k=>{ out.push(k.id); stack.push(k.id); });
  }
  return out;
}
function itemById(id){ return state.items.find(i=>i.id===id); }
function pathOf(item){
  const parts = [];
  let cur = item;
  let guard = 0;
  while(cur && guard < 20){
    parts.unshift(cur.title);
    cur = cur.parentId ? itemById(cur.parentId) : null;
    guard++;
  }
  return parts.join(' / ');
}
function isOverdue(item){
  return item.dueDate && item.dueDate < todayStr() && item.status !== 'Done';
}
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function initials(name){
  if(!name) return '—';
  return name.trim().split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase();
}
function statusClass(s){ return 'st-' + s.replace(/\s+/g,''); }

/* Valid parent candidates for an item: correct type per ALLOWED_PARENTS,
   excluding itself and any of its own descendants (prevents cycles). */
function validParentsFor(item){
  const allowed = ALLOWED_PARENTS[item.type] || [];
  if(allowed.length === 0) return [];
  const desc = new Set(descendantsOf(item.id));
  return state.items.filter(i => allowed.includes(i.type) && i.id !== item.id && !desc.has(i.id));
}

/* Inline, click-to-reveal control for reassigning an item's parent directly from
   list views. Collapsed by default (just shows the current parent's title) to
   save horizontal space; clicking swaps it for a dropdown of valid parents. */
function parentSelectHtml(item){
  const opts = validParentsFor(item);
  if(opts.length === 0){
    return `<span class="parent-none">${item.type==='Epic' ? 'top level only' : '—'}</span>`;
  }
  const current = item.parentId ? itemById(item.parentId) : null;
  const displayLabel = current ? current.title : '— top level —';
  const sorted = opts.slice().sort((a,b)=> a.title.localeCompare(b.title));
  const optionsHtml = ['<option value="">— none (top level) —</option>']
    .concat(sorted.map(o=>`<option value="${o.id}" ${o.id===item.parentId?'selected':''}>${o.id} · ${escapeHtml(o.title)}</option>`));
  return `<div class="parent-cell" data-parentcell="${item.id}">
    <button type="button" class="parent-display" data-parentdisplay="${item.id}" title="${escapeHtml(displayLabel)} — click to change">${escapeHtml(displayLabel)}</button>
    <select class="parent-select" data-parentchange="${item.id}" title="Change parent" style="display:none;">${optionsHtml.join('')}</select>
  </div>`;
}

function wireParentSelects(root){
  // Click the collapsed label to reveal the dropdown in its place.
  root.querySelectorAll('[data-parentdisplay]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const cell = btn.closest('.parent-cell');
      const sel = cell.querySelector('select');
      btn.style.display = 'none';
      sel.style.display = 'block';
      sel.focus();
      if(typeof sel.showPicker === 'function'){
        try{ sel.showPicker(); }catch(err){ /* not supported, focus is enough */ }
      }
    });
  });
  root.querySelectorAll('[data-parentchange]').forEach(sel=>{
    sel.addEventListener('click', e=>e.stopPropagation());
    // Clicking away without changing anything collapses it back to the label.
    sel.addEventListener('blur', ()=>{
      const cell = sel.closest('.parent-cell');
      if(!cell) return;
      const btn = cell.querySelector('.parent-display');
      sel.style.display = 'none';
      if(btn) btn.style.display = 'block';
    });
    sel.addEventListener('change', async ()=>{
      const id = sel.getAttribute('data-parentchange');
      const item = itemById(id);
      const newParent = sel.value;
      item.parentId = newParent;
      if(newParent) state.expanded.add(newParent);
      await persist();
      render();
      toast(newParent ? `${item.id} moved under ${newParent}.` : `${item.id} moved to top level.`);
    });
  });
}

/* =========================================================
   TOASTS
========================================================= */
function toast(msg){
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2600);
}

/* =========================================================
   FILTERING
========================================================= */
function matchesFilters(item){
  const f = state.filters;
  if(f.type && item.type !== f.type) return false;
  if(f.status && item.status !== f.status) return false;
  if(f.priority && item.priority !== f.priority) return false;
  if(f.assignee && item.assignee !== f.assignee) return false;
  if(f.search && !item.title.toLowerCase().includes(f.search.toLowerCase())) return false;
  return true;
}
function anyFilterActive(){
  const f = state.filters;
  return !!(f.search || f.type || f.status || f.priority || f.assignee);
}

/* =========================================================
   RENDER: FILTER BAR OPTIONS
========================================================= */
function populateFilterOptions(){
  const typeSel = document.getElementById('filterType');
  const statusSel = document.getElementById('filterStatus');
  const prioSel = document.getElementById('filterPriority');
  const assigneeSel = document.getElementById('filterAssignee');
  typeSel.innerHTML = '<option value="">All types</option>' + TYPES.map(t=>`<option value="${t}">${t}</option>`).join('');
  statusSel.innerHTML = '<option value="">All statuses</option>' + STATUSES.map(s=>`<option value="${s}">${s}</option>`).join('');
  prioSel.innerHTML = '<option value="">All priorities</option>' + PRIORITIES.map(p=>`<option value="${p}">${p}</option>`).join('');
  const assignees = [...new Set(state.items.map(i=>i.assignee).filter(Boolean))].sort();
  assigneeSel.innerHTML = '<option value="">All assignees</option>' + assignees.map(a=>`<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('');
  typeSel.value = state.filters.type;
  statusSel.value = state.filters.status;
  prioSel.value = state.filters.priority;
  assigneeSel.value = state.filters.assignee;
}

/* =========================================================
   RENDER: TREE VIEW
========================================================= */
function treeVisibleCount(){
  // count items matching filters, including ancestors of matches when filters active
  if(!anyFilterActive()) return state.items.length;
  return state.items.filter(matchesFilters).length;
}

function subtreeHasMatch(id){
  const item = itemById(id);
  if(matchesFilters(item)) return true;
  return childrenOf(id).some(c => subtreeHasMatch(c.id));
}

function renderTree(){
  const root = document.getElementById('viewTree');
  const roots = state.items.filter(i=>!i.parentId);
  const filterActive = anyFilterActive();
  const visibleRoots = filterActive ? roots.filter(r=>subtreeHasMatch(r.id)) : roots;

  if(state.items.length === 0){
    root.innerHTML = emptyState('No items yet', 'Create your first epic, or import a CSV plan to get started.');
    return;
  }
  if(visibleRoots.length === 0){
    root.innerHTML = emptyState('No matches', 'Nothing matches your current filters.');
    return;
  }

  let rows = '';
  function renderNode(item, depth){
    const kids = childrenOf(item.id);
    const visibleKids = filterActive ? kids.filter(k=>subtreeHasMatch(k.id)) : kids;
    const hasKids = kids.length > 0;
    const isOpen = state.expanded.has(item.id);
    const showSelf = filterActive ? matchesFilters(item) || visibleKids.length>0 : true;
    if(!showSelf) return;

    const indent = Array.from({length:depth}).map(()=>'<span class="tree-guide"></span>').join('');
    rows += `
      <div class="tree-row" data-id="${item.id}">
        <div class="tree-title-cell">
          <div class="tree-indent">${indent}</div>
          <button class="expand-btn ${hasKids?'':'leaf'}" data-toggle="${item.id}">${hasKids ? (isOpen?'▾':'▸') : '·'}</button>
          <span class="chip type-${item.type}">${item.type}</span>
          <span class="item-title" title="${escapeHtml(item.title)}"><button data-edit="${item.id}">${escapeHtml(item.title)}</button></span>
        </div>
        <div class="hide-sm"><span class="pri-dot pri-${item.priority}"></span> ${item.priority}</div>
        <div class="hide-sm">${statusSelectHtml(item)}</div>
        <div class="hours-cell hide-sm"><b>${item.actHours||0}</b>/${item.estHours||0}h</div>
        <div class="date-cell ${isOverdue(item)?'overdue':''}">${item.dueDate ? item.dueDate : '—'}</div>
        <div class="hide-sm">${parentSelectHtml(item)}</div>
        <div class="row-actions">
          <button class="icon-btn" title="Add child" data-addchild="${item.id}">+</button>
          <button class="icon-btn" title="Duplicate" data-dup="${item.id}">⧉</button>
          <button class="icon-btn" title="Edit" data-edit2="${item.id}">✎</button>
          <button class="icon-btn" title="Delete" data-del="${item.id}">✕</button>
        </div>
      </div>`;
    if(hasKids && isOpen){
      visibleKids.forEach(k=>renderNode(k, depth+1));
    }
  }
  visibleRoots.forEach(r=>renderNode(r, 0));

  root.innerHTML = `
    <div class="tree-wrap">
      <div class="tree-header">
        <span>Item</span><span class="hide-sm">Priority</span><span class="hide-sm">Status</span><span class="hide-sm">Hours (act/est)</span><span>Due</span><span class="hide-sm">Parent</span><span></span>
      </div>
      ${rows}
    </div>`;
  wireTreeEvents();
}

function statusSelectHtml(item){
  return `<select class="status-pill ${statusClass(item.status)}" data-statuschange="${item.id}" style="border:none;appearance:none;">
    ${STATUSES.map(s=>`<option value="${s}" ${s===item.status?'selected':''}>${s}</option>`).join('')}
  </select>`;
}

function emptyState(title, sub){
  return `<div class="empty-state">
    <div class="glyph">∅</div>
    <h3>${escapeHtml(title)}</h3>
    <p>${escapeHtml(sub)}</p>
    <button class="btn btn-primary" onclick="document.getElementById('btnNew').click()">+ New item</button>
  </div>`;
}

function wireTreeEvents(){
  document.querySelectorAll('[data-toggle]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-toggle');
      if(state.expanded.has(id)) state.expanded.delete(id); else state.expanded.add(id);
      renderTree();
    });
  });
  document.querySelectorAll('[data-edit],[data-edit2]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-edit') || btn.getAttribute('data-edit2');
      openModal('edit', id);
    });
  });
  document.querySelectorAll('[data-addchild]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-addchild');
      const parent = itemById(id);
      const childType = suggestChildType(parent.type);
      openModal('new', null, id, childType);
    });
  });
  document.querySelectorAll('[data-dup]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-dup');
      doDuplicate(id);
    });
  });
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-del');
      confirmDelete(id);
    });
  });
  document.querySelectorAll('[data-statuschange]').forEach(sel=>{
    sel.addEventListener('change', async ()=>{
      const id = sel.getAttribute('data-statuschange');
      const item = itemById(id);
      item.status = sel.value;
      await persist();
      render();
      toast(`${item.id} marked ${item.status}`);
    });
  });
  wireParentSelects(document);
}

function suggestChildType(parentType){
  const map = {Epic:'Feature', Feature:'Task', Task:'Subtask', Subtask:'Issue', Issue:'Issue'};
  return map[parentType] || 'Task';
}

/* =========================================================
   RENDER: TABLE VIEW
========================================================= */
function renderTable(){
  const root = document.getElementById('viewTable');
  let items = state.items.filter(matchesFilters);
  const {key, dir} = state.sort;
  items = items.slice().sort((a,b)=>{
    let av=a[key], bv=b[key];
    if(key==='estHours'||key==='actHours'){ av=Number(av)||0; bv=Number(bv)||0; }
    else { av=(av||'').toString().toLowerCase(); bv=(bv||'').toString().toLowerCase(); }
    if(av<bv) return -1*dir;
    if(av>bv) return 1*dir;
    return 0;
  });

  if(items.length===0){
    root.innerHTML = emptyState(state.items.length? 'No matches' : 'No items yet', state.items.length? 'Nothing matches your current filters.' : 'Create your first item or import a CSV.');
    return;
  }

  const cols = [
    {key:'id', label:'ID'}, {key:'type', label:'Type'}, {key:'title', label:'Title'},
    {key:'assignee', label:'Assignee'}, {key:'status', label:'Status'}, {key:'priority', label:'Priority'},
    {key:'estHours', label:'Est (h)'}, {key:'actHours', label:'Act (h)'}, {key:'dueDate', label:'Due'},
    {key:'parentId', label:'Parent'}, {key:'path', label:'Path'}
  ];
  const headerHtml = cols.map(c=>`<th data-sortkey="${c.key}" class="${key===c.key?'sorted':''}">${c.label}</th>`).join('') + '<th></th>';

  const rowsHtml = items.map(item=>`
    <tr data-id="${item.id}">
      <td style="font-family:var(--mono);font-size:12px;color:var(--ink-dim);">${item.id}</td>
      <td><span class="chip type-${item.type}">${item.type}</span></td>
      <td><button style="background:none;border:none;font:inherit;text-align:left;cursor:pointer;font-weight:500;" data-edit="${item.id}">${escapeHtml(item.title)}</button></td>
      <td>${item.assignee ? `<span class="assignee-cell"><span class="avatar">${initials(item.assignee)}</span>${escapeHtml(item.assignee)}</span>` : '—'}</td>
      <td><span class="status-pill ${statusClass(item.status)}">${item.status}</span></td>
      <td><span class="pri-dot pri-${item.priority}"></span> ${item.priority}</td>
      <td style="font-family:var(--mono);">${item.estHours||0}</td>
      <td style="font-family:var(--mono);">${item.actHours||0}</td>
      <td class="${isOverdue(item)?'overdue':''}" style="font-family:var(--mono);font-size:12px;">${item.dueDate||'—'}</td>
      <td style="min-width:110px;max-width:150px;white-space:normal;">${parentSelectHtml(item)}</td>
      <td class="path-cell" title="${escapeHtml(pathOf(item))}">${escapeHtml(pathOf(item))}</td>
      <td>
        <div class="actions-cell">
          <button class="icon-btn" data-dup="${item.id}" title="Duplicate">⧉</button>
          <button class="icon-btn" data-del="${item.id}" title="Delete">✕</button>
        </div>
      </td>
    </tr>`).join('');

  root.innerHTML = `<div class="table-wrap"><table class="data-table"><thead><tr>${headerHtml}</tr></thead><tbody>${rowsHtml}</tbody></table></div>`;

  root.querySelectorAll('[data-sortkey]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const k = th.getAttribute('data-sortkey');
      if(state.sort.key===k) state.sort.dir *= -1; else { state.sort.key=k; state.sort.dir=1; }
      renderTable();
    });
  });
  root.querySelectorAll('[data-edit]').forEach(btn=>btn.addEventListener('click', ()=>openModal('edit', btn.getAttribute('data-edit'))));
  root.querySelectorAll('[data-dup]').forEach(btn=>btn.addEventListener('click', ()=>doDuplicate(btn.getAttribute('data-dup'))));
  root.querySelectorAll('[data-del]').forEach(btn=>btn.addEventListener('click', ()=>confirmDelete(btn.getAttribute('data-del'))));
  wireParentSelects(root);
}

/* =========================================================
   RENDER: DASHBOARD
========================================================= */
let barChartInstance=null, donutChartInstance=null;
function renderDashboard(){
  const root = document.getElementById('viewDashboard');
  const items = state.items;
  if(items.length===0){ root.innerHTML = emptyState('No data yet','Add items or import a CSV to see team performance.'); return; }

  const total = items.length;
  const done = items.filter(i=>i.status==='Done').length;
  const overdue = items.filter(isOverdue).length;
  const totalEst = items.reduce((s,i)=>s+(Number(i.estHours)||0),0);
  const totalAct = items.reduce((s,i)=>s+(Number(i.actHours)||0),0);
  const variance = totalAct - totalEst;

  const byAssignee = {};
  items.forEach(i=>{
    const a = i.assignee || 'Unassigned';
    if(!byAssignee[a]) byAssignee[a] = {est:0, act:0, count:0, done:0};
    byAssignee[a].est += Number(i.estHours)||0;
    byAssignee[a].act += Number(i.actHours)||0;
    byAssignee[a].count++;
    if(i.status==='Done') byAssignee[a].done++;
  });
  const assignees = Object.keys(byAssignee).sort();

  const statusCounts = {};
  STATUSES.forEach(s=>statusCounts[s]=0);
  items.forEach(i=>statusCounts[i.status] = (statusCounts[i.status]||0)+1);

  root.innerHTML = `
    <div class="cards-row">
      <div class="metric-card"><div class="label">Total items</div><div class="value">${total}</div><div class="sub">${TYPES.map(t=>items.filter(i=>i.type===t).length+' '+t.toLowerCase()).join(' · ')}</div></div>
      <div class="metric-card"><div class="label">Completion</div><div class="value">${total? Math.round(done/total*100):0}%</div><div class="sub">${done} of ${total} done</div></div>
      <div class="metric-card"><div class="label">Overdue</div><div class="value" style="${overdue?'color:var(--danger)':''}">${overdue}</div><div class="sub">past due date, not done</div></div>
      <div class="metric-card"><div class="label">Hours variance</div><div class="value" style="${variance>0?'color:var(--danger)':'color:var(--success)'}">${variance>0?'+':''}${variance}h</div><div class="sub">${totalAct}h logged / ${totalEst}h estimated</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card">
        <h3>Estimated vs. actual hours by assignee</h3>
        <canvas id="barChart"></canvas>
        <table class="assignee-table">
          <thead><tr><th>Assignee</th><th>Items</th><th>Done</th><th>Est</th><th>Act</th><th>Variance</th></tr></thead>
          <tbody>${assignees.map(a=>{
            const d = byAssignee[a]; const v = d.act-d.est;
            return `<tr><td style="font-family:var(--body);font-weight:500;">${escapeHtml(a)}</td><td>${d.count}</td><td>${d.done}</td><td>${d.est}h</td><td>${d.act}h</td><td style="color:${v>0?'var(--danger)':'var(--success)'}">${v>0?'+':''}${v}h</td></tr>`;
          }).join('')}</tbody>
        </table>
      </div>
      <div class="chart-card">
        <h3>Status distribution</h3>
        <canvas id="donutChart"></canvas>
      </div>
    </div>
  `;

  if(barChartInstance) barChartInstance.destroy();
  if(donutChartInstance) donutChartInstance.destroy();

  const barCtx = document.getElementById('barChart').getContext('2d');
  barChartInstance = new Chart(barCtx, {
    type:'bar',
    data:{ labels: assignees, datasets:[
      {label:'Estimated', data: assignees.map(a=>byAssignee[a].est), backgroundColor:'#9AA096'},
      {label:'Actual', data: assignees.map(a=>byAssignee[a].act), backgroundColor:'#1F5D57'}
    ]},
    options:{ responsive:true, plugins:{legend:{position:'bottom', labels:{boxWidth:10,font:{size:11}}}}, scales:{ y:{beginAtZero:true, title:{display:true,text:'hours'}} } }
  });

  const donutCtx = document.getElementById('donutChart').getContext('2d');
  const statusColors = {'Backlog':'#9AA096','In Progress':'#3B5FA8','Blocked':'#B4443B','In Review':'#B9791F','Done':'#3E8A5D'};
  donutChartInstance = new Chart(donutCtx, {
    type:'doughnut',
    data:{ labels: STATUSES, datasets:[{ data: STATUSES.map(s=>statusCounts[s]), backgroundColor: STATUSES.map(s=>statusColors[s]) }]},
    options:{ responsive:true, plugins:{legend:{position:'bottom', labels:{boxWidth:10,font:{size:11}}}} }
  });
}

/* =========================================================
   MASTER RENDER
========================================================= */
function render(){
  populateFilterOptions();
  document.getElementById('viewTree').classList.toggle('hidden', state.view!=='tree');
  document.getElementById('viewTable').classList.toggle('hidden', state.view!=='table');
  document.getElementById('viewDashboard').classList.toggle('hidden', state.view!=='dashboard');
  document.getElementById('countPill').textContent = `${state.items.filter(matchesFilters).length} / ${state.items.length} items`;
  if(state.view==='tree') renderTree();
  else if(state.view==='table') renderTable();
  else renderDashboard();
}

/* =========================================================
   MODAL: ADD / EDIT
========================================================= */
function openModal(mode, itemId=null, presetParentId=null, presetType=null){
  const editing = mode==='edit';
  const item = editing ? itemById(itemId) : null;
  const type = editing ? item.type : (presetType || 'Task');

  function parentOptionsFor(t){
    const allowed = ALLOWED_PARENTS[t];
    if(allowed.length===0) return [];
    return state.items.filter(i=> allowed.includes(i.type) && (!editing || !(i.id===itemId || descendantsOf(itemId).includes(i.id))));
  }

  const modalHtml = `
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>${editing? 'Edit item' : 'New item'}</h2>
        <button class="modal-close" id="closeModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="field"><label>Type</label>
          <select id="f_type">${TYPES.map(t=>`<option value="${t}" ${t===type?'selected':''}>${t}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Parent</label>
          <select id="f_parent"></select>
        </div>
        <div class="field full"><label>Title</label>
          <input type="text" id="f_title" value="${editing?escapeHtml(item.title):''}" placeholder="e.g. Build payment form">
        </div>
        <div class="field full"><label>Description</label>
          <textarea id="f_desc" placeholder="Optional details…">${editing?escapeHtml(item.description):''}</textarea>
        </div>
        <div class="field"><label>Assignee</label>
          <input type="text" id="f_assignee" value="${editing?escapeHtml(item.assignee):''}" placeholder="Name">
        </div>
        <div class="field"><label>Status</label>
          <select id="f_status">${STATUSES.map(s=>`<option value="${s}" ${editing&&item.status===s?'selected':''}>${s}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Priority</label>
          <select id="f_priority">${PRIORITIES.map(p=>`<option value="${p}" ${editing&&item.priority===p?'selected':''}>${p}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Tags</label>
          <input type="text" id="f_tags" value="${editing?escapeHtml(item.tags):''}" placeholder="comma, separated">
        </div>
        <div class="field"><label>Estimated hours (asked for)</label>
          <input type="number" min="0" step="0.5" id="f_est" value="${editing?item.estHours:0}">
        </div>
        <div class="field"><label>Actual hours (time taken)</label>
          <input type="number" min="0" step="0.5" id="f_act" value="${editing?item.actHours:0}">
        </div>
        <div class="field"><label>Start date</label>
          <input type="date" id="f_start" value="${editing?item.startDate:todayStr()}">
        </div>
        <div class="field"><label>Due date</label>
          <input type="date" id="f_due" value="${editing?item.dueDate:''}">
        </div>
      </div>
      <div class="modal-footer">
        <span class="hint">${editing? item.id : 'ID assigned on save'}</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${editing? '<button class="btn btn-danger" id="modalDelete">Delete</button>' : ''}
          ${editing? '<button class="btn" id="modalDuplicate">Duplicate</button>' : ''}
          <button class="btn btn-primary" id="modalSave">${editing?'Save changes':'Create item'}</button>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('modalRoot').innerHTML = modalHtml;

  function refreshParentOptions(){
    const t = document.getElementById('f_type').value;
    const sel = document.getElementById('f_parent');
    const opts = parentOptionsFor(t);
    if(opts.length===0){
      sel.innerHTML = '<option value="">— none (top level) —</option>';
      sel.disabled = true;
    } else {
      sel.disabled = false;
      sel.innerHTML = '<option value="">— none —</option>' + opts.map(o=>`<option value="${o.id}">${o.id} · ${escapeHtml(o.title)}</option>`).join('');
      const desiredParent = editing ? item.parentId : presetParentId;
      if(desiredParent) sel.value = desiredParent;
    }
  }
  refreshParentOptions();
  document.getElementById('f_type').addEventListener('change', refreshParentOptions);

  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });

  if(editing){
    document.getElementById('modalDelete').addEventListener('click', ()=>{ closeModal(); confirmDelete(itemId); });
    document.getElementById('modalDuplicate').addEventListener('click', ()=>{ closeModal(); doDuplicate(itemId); });
  }

  document.getElementById('modalSave').addEventListener('click', async ()=>{
    const title = document.getElementById('f_title').value.trim();
    if(!title){ toast('Title is required.'); return; }
    const t = document.getElementById('f_type').value;
    const parentId = document.getElementById('f_parent').value;
    const data = {
      type: t,
      parentId: parentId,
      title,
      description: document.getElementById('f_desc').value.trim(),
      assignee: document.getElementById('f_assignee').value.trim(),
      status: document.getElementById('f_status').value,
      priority: document.getElementById('f_priority').value,
      tags: document.getElementById('f_tags').value.trim(),
      estHours: parseFloat(document.getElementById('f_est').value)||0,
      actHours: parseFloat(document.getElementById('f_act').value)||0,
      startDate: document.getElementById('f_start').value,
      dueDate: document.getElementById('f_due').value,
    };
    if(editing){
      const previousAssignee = item.assignee;
      Object.assign(item, data);

      if (data.assignee && data.assignee !== previousAssignee) {
        descendantsOf(item.id).forEach(descId => {
          const child = itemById(descId);
          if (child && !String(child.assignee || '').trim()) {
            child.assignee = data.assignee;
          }
        });
      }

      toast(`${item.id} updated.`);
    } else {
      const id = nextId(t);
      const newItem = Object.assign({id, createdAt: todayStr()}, data);
      state.items.push(newItem);
      state.expanded.add(parentId);
      toast(`${id} created.`);
    }
    await persist();
    closeModal();
    render();
  });
}
function closeModal(){ document.getElementById('modalRoot').innerHTML = ''; }

function confirmDelete(id){
  const item = itemById(id);
  const desc = descendantsOf(id);
  const modalHtml = `
  <div class="overlay" id="overlay">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header"><h2>Delete ${item.id}?</h2><button class="modal-close" id="closeModal">✕</button></div>
      <div class="modal-body" style="grid-template-columns:1fr;">
        <p style="margin:0;color:var(--ink-dim);font-size:13.5px;">This will permanently delete <strong>${escapeHtml(item.title)}</strong>${desc.length? ` and its ${desc.length} descendant item${desc.length>1?'s':''}` : ''}. This can't be undone.</p>
      </div>
      <div class="modal-footer" style="justify-content:flex-end;">
        <button class="btn" id="cancelDel">Cancel</button>
        <button class="btn btn-danger" style="border-color:var(--danger);" id="confirmDel">Delete</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalRoot').innerHTML = modalHtml;
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('cancelDel').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });
  document.getElementById('confirmDel').addEventListener('click', async ()=>{
    const idsToRemove = new Set([id, ...desc]);
    state.items = state.items.filter(i=>!idsToRemove.has(i.id));
    await persist();
    closeModal();
    render();
    toast(`Deleted ${idsToRemove.size} item(s).`);
  });
}

/* =========================================================
   DUPLICATE (item + descendants)
========================================================= */
function duplicateItem(id, newParentId){
  const orig = itemById(id);
  const newId = nextId(orig.type);
  const clone = Object.assign({}, orig, {
    id: newId,
    parentId: newParentId !== undefined ? newParentId : orig.parentId,
    createdAt: todayStr()
  });
  // Only append "(copy)" to the title of the top-level item being duplicated,
  // not to every descendant carried along with it.
  if(newParentId === undefined) clone.title = orig.title + ' (copy)';
  state.items.push(clone);

  const kids = childrenOf(id);
  kids.forEach(k => duplicateItem(k.id, newId));
  if(kids.length) state.expanded.add(newId);

  return newId;
}

async function doDuplicate(id){
  const orig = itemById(id);
  if(!orig) return;
  const desc = descendantsOf(id);
  const newId = duplicateItem(id);
  if(orig.parentId) state.expanded.add(orig.parentId);
  await persist();
  render();
  toast(desc.length
    ? `Duplicated ${orig.id} and ${desc.length} descendant${desc.length>1?'s':''} as ${newId}.`
    : `Duplicated as ${newId}.`);
}

/* =========================================================
   CSV IMPORT / EXPORT
========================================================= */
const CSV_COLUMNS = ['id','type','parentId','title','description','assignee','status','priority','estHours','actHours','startDate','dueDate','tags','createdAt'];

function downloadBlob(content, filename, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('btnTemplate').addEventListener('click', ()=>{
  const sample = [
    {id:'EPIC-1', type:'Epic', parentId:'', title:'Sample Epic', description:'What this epic covers', assignee:'', status:'Backlog', priority:'Medium', estHours:100, actHours:0, startDate:'2026-07-01', dueDate:'2026-09-01', tags:'', createdAt:todayStr()},
    {id:'FEAT-1', type:'Feature', parentId:'EPIC-1', title:'Sample Feature', description:'', assignee:'', status:'Backlog', priority:'Medium', estHours:40, actHours:0, startDate:'', dueDate:'', tags:'', createdAt:todayStr()},
    {id:'TASK-1', type:'Task', parentId:'FEAT-1', title:'Sample Task', description:'', assignee:'Jane Doe', status:'Backlog', priority:'High', estHours:8, actHours:0, startDate:'', dueDate:'', tags:'', createdAt:todayStr()},
    {id:'SUB-1', type:'Subtask', parentId:'TASK-1', title:'Sample Subtask', description:'', assignee:'Jane Doe', status:'Backlog', priority:'Low', estHours:2, actHours:0, startDate:'', dueDate:'', tags:'', createdAt:todayStr()},
    {id:'ISS-1', type:'Issue', parentId:'TASK-1', title:'Sample Issue', description:'A bug or blocker', assignee:'', status:'Blocked', priority:'Critical', estHours:0, actHours:0, startDate:'', dueDate:'', tags:'', createdAt:todayStr()}
  ];
  const csv = Papa.unparse({fields: CSV_COLUMNS, data: sample});
  downloadBlob(csv, 'taskboard-template.csv', 'text/csv;charset=utf-8;');
  toast('Template downloaded.');
});

document.getElementById('btnExport').addEventListener('click', ()=>{
  const rows = state.items.map(i=>{
    const row = {};
    CSV_COLUMNS.forEach(c=>row[c]=i[c] ?? '');
    return row;
  });
  const csv = Papa.unparse({fields: CSV_COLUMNS, data: rows});
  downloadBlob(csv, `taskboard-export-${todayStr()}.csv`, 'text/csv;charset=utf-8;');
  toast(`Exported ${state.items.length} items.`);
});

document.getElementById('btnImport').addEventListener('click', ()=>{
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    Papa.parse(ev.target.result, {
      header: true,
      skipEmptyLines: true,
      complete: (results) => showImportPreview(results.data, results.errors),
      error: (err) => toast('Could not parse CSV: ' + err.message)
    });
  };
  reader.readAsText(file);
  e.target.value = '';
});

function showImportPreview(rows, errors){
  if(!rows || rows.length===0){ toast('No rows found in that CSV.'); return; }
  const normalized = rows.map(r=>{
    const norm = {};
    Object.keys(r).forEach(k=>{ norm[k.trim()] = r[k]; });
    return {
      id: (norm.id||'').trim(),
      type: TYPES.includes(norm.type) ? norm.type : 'Task',
      parentId: (norm.parentId||'').trim(),
      title: (norm.title||'').trim() || '(untitled)',
      description: norm.description||'',
      assignee: norm.assignee||'',
      status: STATUSES.includes(norm.status) ? norm.status : 'Backlog',
      priority: PRIORITIES.includes(norm.priority) ? norm.priority : 'Medium',
      estHours: parseFloat(norm.estHours)||0,
      actHours: parseFloat(norm.actHours)||0,
      startDate: norm.startDate||'',
      dueDate: norm.dueDate||'',
      tags: norm.tags||'',
      createdAt: norm.createdAt || todayStr()
    };
  });

  const existingIds = new Set(state.items.map(i=>i.id));
  const newCount = normalized.filter(r=>!r.id || !existingIds.has(r.id)).length;
  const updateCount = normalized.length - newCount;

  const modalHtml = `
  <div class="overlay" id="overlay">
    <div class="modal" style="max-width:460px;">
      <div class="modal-header"><h2>Import ${normalized.length} rows</h2><button class="modal-close" id="closeModal">✕</button></div>
      <div class="modal-body" style="grid-template-columns:1fr;">
        <p style="margin:0;color:var(--ink-dim);font-size:13.5px;">${newCount} new item${newCount!==1?'s':''}, ${updateCount} matching existing ID${updateCount!==1?'s':''} to update.${errors.length? ` ${errors.length} row(s) had parsing issues and were skipped.`:''}</p>
        <label class="checkbox-row"><input type="checkbox" id="replaceAll"> Replace all existing data instead of merging</label>
      </div>
      <div class="modal-footer" style="justify-content:flex-end;">
        <button class="btn" id="cancelImport">Cancel</button>
        <button class="btn btn-primary" id="confirmImport">Import</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalRoot').innerHTML = modalHtml;
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('cancelImport').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });
  document.getElementById('confirmImport').addEventListener('click', async ()=>{
    const replace = document.getElementById('replaceAll').checked;
    if(replace){
      state.items = [];
      state.counters = {Epic:0,Feature:0,Task:0,Subtask:0,Issue:0};
    }
    normalized.forEach(r=>{
      if(r.id && itemById(r.id)){
        Object.assign(itemById(r.id), r);
      } else {
        if(!r.id || itemById(r.id)) r.id = nextId(r.type);
        state.items.push(r);
      }
    });
    recalcCountersFromItems();
    await persist();
    closeModal();
    render();
    toast(`Imported ${normalized.length} rows.`);
  });
}
